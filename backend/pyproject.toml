[project]
name = "nebius-market-abuse-arena-backend"
version = "0.1.0"
description = "FastAPI backend and synthetic market simulation for Nebius Market Abuse Arena."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.111.0",
  "numpy>=1.26.0",
  "pydantic>=2.7.0",
  "pydantic-settings>=2.3.0",
  "pytest>=8.2.0",
  "python-dotenv>=1.0.0",
  "pyyaml>=6.0.0",
  "uvicorn[standard]>=0.30.0"
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
