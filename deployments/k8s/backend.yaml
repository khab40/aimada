apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aimada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/ai-market-abuse-detection-arena-backend:k8s
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: aimada-config
            - secretRef:
                name: aimada-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: outputs
              mountPath: /app/outputs
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: outputs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aimada
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
