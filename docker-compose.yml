name: lob-arena

services:
  java-kernel:
    build:
      context: .
      dockerfile: java/Dockerfile
    environment:
      LOB_KERNEL_GRPC_ENABLED: "true"
      LOB_KERNEL_GRPC_PORT: "50051"
      LOB_KERNEL_OTLP_ENABLED: ${LOB_KERNEL_OTLP_ENABLED:-false}
      LOB_KERNEL_OTLP_METRICS_ENABLED: ${LOB_KERNEL_OTLP_METRICS_ENABLED:-false}
      LOB_KERNEL_TRACE_SAMPLE_PROBABILITY: ${LOB_KERNEL_TRACE_SAMPLE_PROBABILITY:-0.1}
      ARENA_REMOTE_AGENT_URLS: ${ARENA_REMOTE_AGENT_URLS:-http://agent-runner:9100}
      ARENA_REMOTE_AGENT_TIMEOUT_MS: ${ARENA_REMOTE_AGENT_TIMEOUT_MS:-250}
      ARENA_TICK_INTERVAL_MS: ${ARENA_TICK_INTERVAL_MS:-500}
      ARENA_WEBSOCKET_STREAM_INTERVAL_MS: ${ARENA_WEBSOCKET_STREAM_INTERVAL_MS:-500}
      ARENA_OUTPUT_DIR: /app/outputs
    ports:
      - "8081:8080"
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    depends_on:
      agent-runner:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs

  agent-runner:
    build:
      context: .
      dockerfile: agent-runner/Dockerfile
    environment:
      AGENT_RUNNER_ID: ${AGENT_RUNNER_ID:-remote-1}
      AGENT_RUNNER_AGENT_COUNT: ${AGENT_RUNNER_AGENT_COUNT:-24}
      AGENT_RUNNER_MAX_AGENT_COUNT: ${AGENT_RUNNER_MAX_AGENT_COUNT:-48}
      AGENT_RUNNER_HEAVY_AGENT_COUNT: ${AGENT_RUNNER_HEAVY_AGENT_COUNT:-0}
      AGENT_RUNNER_MAX_HEAVY_AGENT_COUNT: ${AGENT_RUNNER_MAX_HEAVY_AGENT_COUNT:-2}
      AGENT_RUNNER_HEAVY_AGENT_COMPLEXITY: ${AGENT_RUNNER_HEAVY_AGENT_COMPLEXITY:-20000}
      AGENT_RUNNER_HEAVY_AGENT_WORKERS: ${AGENT_RUNNER_HEAVY_AGENT_WORKERS:-1}
      AGENT_RUNNER_MAX_HEAVY_AGENT_WORKERS: ${AGENT_RUNNER_MAX_HEAVY_AGENT_WORKERS:-1}
      AGENT_RUNNER_LANGGRAPH_AGENT_COUNT: ${AGENT_RUNNER_LANGGRAPH_AGENT_COUNT:-0}
      AGENT_RUNNER_MAX_LANGGRAPH_AGENT_COUNT: ${AGENT_RUNNER_MAX_LANGGRAPH_AGENT_COUNT:-4}
      AGENT_RUNNER_LANGGRAPH_STRATEGY: ${AGENT_RUNNER_LANGGRAPH_STRATEGY:-liquidity_rebalancer}
      AGENT_RUNNER_AGENT_ID_PREFIX: ${AGENT_RUNNER_AGENT_ID_PREFIX:-REMOTE}
      AGENT_RUNNER_DECISION_TIMEOUT_SECONDS: ${AGENT_RUNNER_DECISION_TIMEOUT_SECONDS:-0.05}
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_NEBIUS_CLI: "false"
    environment:
      LOG_LEVEL: INFO
      ARENA_OUTPUT_DIR: /app/outputs
      ARENA_DATA_RETENTION_DAYS: ${ARENA_DATA_RETENTION_DAYS:-1}
      ARENA_LOCAL_BATCH_MAX_WORKERS: ${ARENA_LOCAL_BATCH_MAX_WORKERS:-1}
      JAVA_ARENA_BASE_URL: http://java-kernel:8080
      JAVA_ARENA_TIMEOUT_SECONDS: ${JAVA_ARENA_TIMEOUT_SECONDS:-2}
      # Retained only for Nebius/AI runner health reporting; Java orchestrates decisions.
      ARENA_REMOTE_AGENT_URLS: ${ARENA_REMOTE_AGENT_URLS:-http://agent-runner:9100}
      ENDPOINT_TOKEN: ${ENDPOINT_TOKEN:-}
      NEBIUS_TENANT_ID: ${NEBIUS_TENANT_ID:-}
      NEBIUS_ENDPOINT_MODE: ${NEBIUS_ENDPOINT_MODE:-mock}
      NEBIUS_ENDPOINT_BASE_URL: ${NEBIUS_ENDPOINT_BASE_URL:-}
      NEBIUS_INCIDENT_EXPLAINER_URL: ${NEBIUS_INCIDENT_EXPLAINER_URL:-}
      NEBIUS_SCENARIO_GENERATOR_URL: ${NEBIUS_SCENARIO_GENERATOR_URL:-}
      NEBIUS_ORDERBOOK_ALERT_URL: ${NEBIUS_ORDERBOOK_ALERT_URL:-}
      NEBIUS_INVESTIGATION_REPORT_URL: ${NEBIUS_INVESTIGATION_REPORT_URL:-}
      NEBIUS_INVESTIGATION_TEAM_URL: ${NEBIUS_INVESTIGATION_TEAM_URL:-}
      NEBIUS_INFERENCE_TIMEOUT_SECONDS: ${NEBIUS_INFERENCE_TIMEOUT_SECONDS:-180}
      NEBIUS_INPUT_TOKEN_COST_PER_MILLION_USD: ${NEBIUS_INPUT_TOKEN_COST_PER_MILLION_USD:-0}
      NEBIUS_OUTPUT_TOKEN_COST_PER_MILLION_USD: ${NEBIUS_OUTPUT_TOKEN_COST_PER_MILLION_USD:-0}
      NEBIUS_JOB_COST_PER_HOUR_USD: ${NEBIUS_JOB_COST_PER_HOUR_USD:-0}
      NEBIUS_HEALTH_TIMEOUT_SECONDS: ${NEBIUS_HEALTH_TIMEOUT_SECONDS:-5}
      NEBIUS_LOCAL_TOURNAMENT_SCENARIO_LIMIT: ${NEBIUS_LOCAL_TOURNAMENT_SCENARIO_LIMIT:-24}
      NEBIUS_JOB_IMAGE: ${NEBIUS_JOB_IMAGE:-ghcr.io/khab40/lob-arena-jobs:latest}
      NEBIUS_SUBNET_ID: ${NEBIUS_SUBNET_ID:-}
      NEBIUS_PARENT_ID: ${NEBIUS_PARENT_ID:-}
      NEBIUS_VOLUME: ${NEBIUS_VOLUME:-}
      NEBIUS_JOB_OUTPUT_VOLUME: ${NEBIUS_JOB_OUTPUT_VOLUME:-}
      NEBIUS_JOB_OUTPUT_URI: ${NEBIUS_JOB_OUTPUT_URI:-}
      NEBIUS_OBJECT_STORAGE_ENDPOINT_URL: ${NEBIUS_OBJECT_STORAGE_ENDPOINT_URL:-}
      # Cloud commands are opt-in through docker-compose.nebius.yml. Keeping
      # these empty prevents stale .env values from invoking a missing CLI.
      NEBIUS_JOB_SUBMIT_COMMAND_TEMPLATE: ""
      NEBIUS_JOB_STATUS_COMMAND_TEMPLATE: ""
      NEBIUS_JOB_LOGS_COMMAND_TEMPLATE: ""
      NEBIUS_JOB_ARTIFACTS_COMMAND_TEMPLATE: ""
      NEBIUS_JOB_RUNS: ${NEBIUS_JOB_RUNS:-1000}
      NEBIUS_JOB_BATCH_SIZE: ${NEBIUS_JOB_BATCH_SIZE:-100}
      NEBIUS_JOB_OUTPUT_DIR: ${NEBIUS_JOB_OUTPUT_DIR:-/job/outputs/serverless-batch}
      NEBIUS_JOB_SCENARIOS: ${NEBIUS_JOB_SCENARIOS:-normal_market,spoofing_like_wall,layering_like,quote_stuffing,liquidity_evaporation}
    ports:
      - "8000:8000"
    depends_on:
      java-kernel:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5173
      VITE_ARENA_MODE: websocket
      VITE_ARENA_WS_URL: ws://localhost:5173/ws/arena
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - java-kernel

  prometheus:
    image: prom/prometheus:v3.8.0
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      java-kernel:
        condition: service_healthy
      agent-runner:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./monitoring/prometheus/java-kernel.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:13.0.3
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_AUTH_ANONYMOUS_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
