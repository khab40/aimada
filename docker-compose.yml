services:
  endpoint:
    build:
      context: ./serverless/endpoint
    environment:
      NEBIUS_ENDPOINT_MODE: ${NEBIUS_ENDPOINT_MODE:-mock}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_BASE_URL: ${NEBIUS_BASE_URL:-}
      NEBIUS_MODEL: ${NEBIUS_MODEL:-}
      NEBIUS_AI_STUDIO_BASE_URL: ${NEBIUS_AI_STUDIO_BASE_URL:-}
      NEBIUS_AI_MODEL: ${NEBIUS_AI_MODEL:-}
      NEBIUS_TEMPERATURE: ${NEBIUS_TEMPERATURE:-0.2}
      NEBIUS_MAX_TOKENS: ${NEBIUS_MAX_TOKENS:-800}
      NEBIUS_REQUEST_TIMEOUT_SECONDS: ${NEBIUS_REQUEST_TIMEOUT_SECONDS:-12}
    ports:
      - "9001:9000"

  agent-runner:
    build:
      context: .
      dockerfile: agent-runner/Dockerfile
    environment:
      AGENT_RUNNER_ID: ${AGENT_RUNNER_ID:-remote-1}
      AGENT_RUNNER_AGENT_COUNT: ${AGENT_RUNNER_AGENT_COUNT:-200}
      AGENT_RUNNER_HEAVY_AGENT_COUNT: ${AGENT_RUNNER_HEAVY_AGENT_COUNT:-8}
      AGENT_RUNNER_HEAVY_AGENT_COMPLEXITY: ${AGENT_RUNNER_HEAVY_AGENT_COMPLEXITY:-20000}
      AGENT_RUNNER_HEAVY_AGENT_WORKERS: ${AGENT_RUNNER_HEAVY_AGENT_WORKERS:-2}
      AGENT_RUNNER_LANGGRAPH_AGENT_COUNT: ${AGENT_RUNNER_LANGGRAPH_AGENT_COUNT:-16}
      AGENT_RUNNER_LANGGRAPH_STRATEGY: ${AGENT_RUNNER_LANGGRAPH_STRATEGY:-liquidity_rebalancer}
      AGENT_RUNNER_AGENT_ID_PREFIX: ${AGENT_RUNNER_AGENT_ID_PREFIX:-REMOTE}
      AGENT_RUNNER_DECISION_TIMEOUT_SECONDS: ${AGENT_RUNNER_DECISION_TIMEOUT_SECONDS:-0.05}
    ports:
      - "9100:9100"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      LOG_LEVEL: INFO
      ARENA_OUTPUT_DIR: /app/outputs
      ARENA_AGENT_COUNT: ${ARENA_AGENT_COUNT:-3}
      ARENA_AGENT_DECISION_TIMEOUT_SECONDS: ${ARENA_AGENT_DECISION_TIMEOUT_SECONDS:-0.05}
      ARENA_REMOTE_AGENT_URLS: ${ARENA_REMOTE_AGENT_URLS:-http://agent-runner:9100}
      ARENA_REMOTE_AGENT_TIMEOUT_SECONDS: ${ARENA_REMOTE_AGENT_TIMEOUT_SECONDS:-0.05}
      ARENA_BASELINE_LIQUIDITY_LEVELS: ${ARENA_BASELINE_LIQUIDITY_LEVELS:-12}
      ARENA_BASELINE_LIQUIDITY_BASE_SIZE: ${ARENA_BASELINE_LIQUIDITY_BASE_SIZE:-1.5}
      ARENA_BASELINE_LIQUIDITY_TICK_SIZE: ${ARENA_BASELINE_LIQUIDITY_TICK_SIZE:-1.0}
      ARENA_BASELINE_LIQUIDITY_REFERENCE_PRICE: ${ARENA_BASELINE_LIQUIDITY_REFERENCE_PRICE:-68125.0}
      ARENA_MAX_AGENT_QUOTE_SIZE: ${ARENA_MAX_AGENT_QUOTE_SIZE:-25.0}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5173}
      AIMADA_JWT_SECRET: ${AIMADA_JWT_SECRET:-dev-only-change-me}
      AIMADA_JWT_ISSUER: ${AIMADA_JWT_ISSUER:-ai-market-abuse-detection-arena}
      AIMADA_JWT_EXPIRES_IN_SECONDS: ${AIMADA_JWT_EXPIRES_IN_SECONDS:-43200}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_TENANT_ID: ${NEBIUS_TENANT_ID:-}
      NEBIUS_ENDPOINT_BASE_URL: ${NEBIUS_ENDPOINT_BASE_URL:-http://endpoint:9000}
      NEBIUS_INCIDENT_EXPLAINER_URL: ${NEBIUS_INCIDENT_EXPLAINER_URL:-}
      NEBIUS_SCENARIO_GENERATOR_URL: ${NEBIUS_SCENARIO_GENERATOR_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      - endpoint
      - agent-runner

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ARENA_MODE: websocket
      VITE_ARENA_WS_URL: ws://localhost:8000/ws/arena
    ports:
      - "5173:5173"
    depends_on:
      - backend
