spring.application.name=lob-arena-java-control-plane
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.distribution.percentiles-histogram.lob.kernel.grpc.duration=true
management.tracing.sampling.probability=${LOB_KERNEL_TRACE_SAMPLE_PROBABILITY:0.1}
management.otlp.metrics.export.enabled=${LOB_KERNEL_OTLP_METRICS_ENABLED:false}
management.opentelemetry.tracing.export.otlp.enabled=${LOB_KERNEL_OTLP_ENABLED:false}
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://127.0.0.1:4318/v1/traces}
management.opentelemetry.resource-attributes.service.namespace=lob-arena
management.opentelemetry.resource-attributes.service.version=0.1.0-SNAPSHOT
lob.kernel.grpc.enabled=${LOB_KERNEL_GRPC_ENABLED:false}
lob.kernel.grpc.port=${LOB_KERNEL_GRPC_PORT:50051}
lob.agents.runner-urls=${ARENA_REMOTE_AGENT_URLS:http://agent-runner:9100}
lob.agents.runner-timeout-ms=${ARENA_REMOTE_AGENT_TIMEOUT_MS:250}
lob.arena.tick-interval-ms=${ARENA_TICK_INTERVAL_MS:500}
lob.arena.websocket.stream-interval-ms=${ARENA_WEBSOCKET_STREAM_INTERVAL_MS:500}
lob.arena.output-dir=${ARENA_OUTPUT_DIR:../outputs}
