  <rect x="830" y="595" width="240" height="60" fill="#1f2937" stroke="#4a5568" stroke-width="0.5"/>
  <text x="840" y="610" font-size="10" fill="#60a5fa">Success Rate</text>
  <text x="850" y="630" font-size="16" font-weight="bold" fill="#86efac">99.6%</text>

