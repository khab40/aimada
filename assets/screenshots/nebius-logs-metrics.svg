  <text x="40" y="735" font-size="9" fill="#a0aec0">p50: 43ms | p95: 61ms | p99: 78ms | max: 142ms</text>
  <text x="40" y="752" font-size="9" fill="#a0aec0">Errors: 0 | Timeouts: 2 (retried successfully)</text>

