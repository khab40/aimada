  <rect x="30" y="525" width="320" height="20" fill="#1f2937" stroke="#4b5563" stroke-width="0.5"/>
  <text x="40" y="540" font-size="10" fill="#86efac">spoofing-like-001</text>

  <text x="30" y="570" font-size="11" fill="#a0aec0">Injection Controls:</text>
  <rect x="30" y="585" width="320" height="25" fill="#1f2937" stroke="#4b5563" stroke-width="0.5"/>
  <text x="40" y="605" font-size="10" fill="#60a5fa">+ Inject | Pause | Reset</text>

  <text x="30" y="635" font-size="11" fill="#a0aec0">Agents:</text>
  <text x="40" y="655" font-size="10" fill="#a0aec0">🟢 Liquidity Provider (5)</text>
  <text x="40" y="675" font-size="10" fill="#a0aec0">🔴 Spoofing Agent (1)</text>
  <text x="40" y="695" font-size="10" fill="#a0aec0">🟡 Market Maker (2)</text>
  <text x="40" y="715" font-size="10" fill="#a0aec0">⚪ Random Traders (12)</text>

  <!-- Incident Details (Bottom Right) -->
  <rect x="390" y="280" width="790" height="500" fill="#1a1f2e" stroke="#4a5568" stroke-width="1"/>
  <text x="400" y="305" font-size="14" font-weight="bold" fill="#22d3ee">Incident Details</text>

  <text x="400" y="330" font-size="11" fill="#a0aec0">INC-0001 | Quote Stuffing | Confidence: 0.89</text>
  <text x="400" y="350" font-size="10" fill="#a0aec0">Time Window: 14:32:15 - 14:32:28</text>

  <rect x="400" y="360" width="770" height="200" fill="#0f1419" stroke="#4a5568" stroke-width="0.5"/>
  <text x="410" y="380" font-size="10" fill="#60a5fa">Evidence:</text>
  <text x="420" y="400" font-size="9" fill="#a0aec0">• High-frequency order/cancel bursts: 127 orders in 5s</text>
  <text x="420" y="420" font-size="9" fill="#a0aec0">• Orders placed away from touch, canceled within 100ms</text>
  <text x="420" y="440" font-size="9" fill="#a0aec0">• Temporary book pressure spike: 15% → 3% over 3s</text>
  <text x="420" y="460" font-size="9" fill="#a0aec0">• Order execution: 0% (all canceled)</text>
  <text x="420" y="480" font-size="9" fill="#a0aec0">• Timing: correlated with competitor price change</text>
  <text x="420" y="500" font-size="9" fill="#a0aec0">• Actor: Spoofing Agent (simulated)</text>
  <text x="420" y="520" font-size="9" fill="#a0aec0">• Recommendation: Investigate order history and messaging</text>

  <text x="410" y="555" font-size="10" fill="#60a5fa">AI Explanation:</text>
  <text x="420" y="575" font-size="9" fill="#a0aec0">The detector identified a classic spoofing signature: large</text>
  <text x="420" y="592" font-size="9" fill="#a0aec0">orders placed away from the mid, followed by immediate</text>
  <text x="420" y="609" font-size="9" fill="#a0aec0">cancellation after book pressure changed. The timing and</text>
  <text x="420" y="626" font-size="9" fill="#a0aec0">pattern suggest intent to manipulate rather than trade.</text>

  <rect x="400" y="650" width="770" height="25" fill="#1f2937" stroke="#4b5563" stroke-width="0.5"/>
  <text x="415" y="668" font-size="10" fill="#60a5fa">📄 View Event Log | 🔍 Replay | 📊 Export Report</text>
