  <rect x="825" y="95" width="350" height="25" fill="#7c2d12" opacity="0.3" stroke="#dc2626" stroke-width="0.5"/>
  <text x="835" y="115" font-size="10" fill="#fca5a5">INC-0001: Quote Stuffing Detected (0.89)</text>

  <rect x="825" y="125" width="350" height="25" fill="#7c2d12" opacity="0.3" stroke="#dc2626" stroke-width="0.5"/>
