name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    # ensure Python can import top-level packages like `serverless`
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --project backend --dev --frozen

      - name: Run Ruff
        run: uv run --project backend ruff check backend serverless scripts

      - name: Run backend tests
        working-directory: backend
        run: uv run pytest -c pyproject.toml tests --junitxml=test-results.xml

      - name: Upload backend test report
        if: ${{ always() && hashFiles('backend/test-results.xml') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: backend-test-results
          path: backend/test-results.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend contract tests
        run: pnpm test

      - name: Run ESLint
        run: pnpm run lint

      - name: Build production frontend
        run: pnpm run build

  java-kernel:
    name: Java 25 kernel and control plane
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: java
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
          cache-dependency-path: |
            java/*.gradle.kts
            java/gradle/wrapper/gradle-wrapper.properties
            java/**/build.gradle.kts

      - name: Validate Java modules
        run: ./gradlew clean check --no-daemon

      - name: Upload Java test reports
        if: ${{ always() && hashFiles('java/**/build/reports/tests/test/**') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: java-test-reports
          path: java/**/build/reports/tests/test
          if-no-files-found: ignore

  cross-language-parity:
    name: Permanent Python and Java parity replay
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
          cache-dependency-path: |
            java/*.gradle.kts
            java/gradle/wrapper/gradle-wrapper.properties
            java/**/build.gradle.kts

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install locked Python dependencies
        run: uv sync --project backend --dev --frozen

      - name: Build production Java kernel
        working-directory: java
        run: ./gradlew :control-plane:bootJar --no-daemon

      - name: Replay permanent cross-language corpus
        env:
          LOB_KERNEL_GRPC_ENABLED: "true"
        run: |
          set -euo pipefail
          kernel_jar="$(find java/control-plane/build/libs -maxdepth 1 -name 'control-plane-*.jar' ! -name '*-plain.jar' -print -quit)"
          test -n "$kernel_jar"
          java -jar "$kernel_jar" > java-kernel-ci.log 2>&1 &
          kernel_pid=$!
          trap 'kill "$kernel_pid" 2>/dev/null || true' EXIT

          for attempt in {1..60}; do
            if python -c 'import socket; socket.create_connection(("127.0.0.1", 50051), 1).close()'; then
              uv run --project backend python scripts/run_kernel_shadow_corpus.py --target 127.0.0.1:50051
              exit 0
            fi
            if ! kill -0 "$kernel_pid" 2>/dev/null; then
              cat java-kernel-ci.log
              exit 1
            fi
            sleep 1
          done
          cat java-kernel-ci.log
          exit 1

      - name: Upload Java parity service log
        if: ${{ failure() && hashFiles('java-kernel-ci.log') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: java-kernel-parity-log
          path: java-kernel-ci.log
          if-no-files-found: ignore

  deterministic-evaluation:
    name: Deterministic CPU evaluation
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --project backend --dev --frozen

      - name: Generate fixed synthetic scenarios
        run: uv run --project backend python scripts/generate_scenarios.py --samples 3 --output outputs/ci-eval/synthetic-dataset

      - name: Run small local evaluation
        run: uv run --project backend python scripts/run_local_eval.py --runs 3 --batch-size 2 --output outputs/ci-eval

      - name: Validate generated artifacts
        run: uv run --project backend python scripts/validate_ci_artifacts.py outputs/ci-eval

      - name: Upload deterministic evaluation artifacts
        uses: actions/upload-artifact@v6
        with:
          name: deterministic-evaluation
          path: outputs/ci-eval
          if-no-files-found: error
          retention-days: 14

  agent-workspace:
    name: Agent workspace validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install agent workspace dependencies
        run: uv sync --project backend --dev --frozen

      - name: Validate agent workspace contract
        run: uv run --project backend python scripts/validate_agent_workspace.py

  application-images:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: .
            file: backend/Dockerfile
          - name: frontend
            context: frontend
            file: frontend/Dockerfile
          - name: agent-runner
            context: .
            file: agent-runner/Dockerfile
          - name: java-kernel
            context: .
            file: java/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without pushing
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: lob-arena-ci/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Smoke test backend runtime imports
        if: ${{ matrix.name == 'backend' }}
        run: docker run --rm lob-arena-ci/backend:${{ github.sha }} python -c 'import app.main'

      - name: Smoke test Java runtime layout
        if: ${{ matrix.name == 'java-kernel' }}
        run: docker run --rm --entrypoint sh lob-arena-ci/java-kernel:${{ github.sha }} -c 'test "$(id -u)" -ne 0 && test -r /app/app.jar'

  compose:
    name: Validate Compose configurations
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create safe local environment
        run: cp .env.example .env

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Validate Nebius Compose override
        env:
          NEBIUS_ENDPOINT_BASE_URL: https://example.invalid
        run: docker compose -f docker-compose.yml -f docker-compose.nebius.yml config --quiet

      - name: Verify local mode ignores cloud command templates
        env:
          NEBIUS_JOB_SUBMIT_COMMAND_TEMPLATE: should-not-run
          NEBIUS_JOB_STATUS_COMMAND_TEMPLATE: should-not-run
          NEBIUS_JOB_LOGS_COMMAND_TEMPLATE: should-not-run
          NEBIUS_JOB_ARTIFACTS_COMMAND_TEMPLATE: should-not-run
        run: |
          docker compose config --format json | jq -e '
            .services.backend.environment as $env
            | ($env.NEBIUS_ENDPOINT_MODE == "mock") and ([
                $env.NEBIUS_JOB_SUBMIT_COMMAND_TEMPLATE,
                $env.NEBIUS_JOB_STATUS_COMMAND_TEMPLATE,
                $env.NEBIUS_JOB_LOGS_COMMAND_TEMPLATE,
                $env.NEBIUS_JOB_ARTIFACTS_COMMAND_TEMPLATE
              ]
            | all(. == ""))
          '

  secret-scan:
    name: Scan repository history for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
