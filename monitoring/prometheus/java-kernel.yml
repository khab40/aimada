global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: lob-arena-java-kernel
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["java-kernel:8080"]

  - job_name: lob-arena-python-control-plane
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
