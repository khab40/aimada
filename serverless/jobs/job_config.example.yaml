name: market-abuse-detector-tournament
kind: detector_tournament
platform: cpu-d3
preset: 4vcpu-16gb
subnet_name: default-subnet

image:
  repository: ghcr.io/your-org/lob-arena-jobs
  tag: latest

args:
  - python
  - detector_tournament.py
  - --runs
  - "100"
  - --scenarios
  - spoofing,layering,quote_stuffing,liquidity_evaporation
  - --detectors
  - spoofing_like,layering_like,quote_stuffing,liquidity_shock
  - --output
  - /job/outputs/benchmark

outputs:
  local_mount: outputs/benchmark
  artifacts:
    - benchmark_report.md
    - metrics.csv
    - results.json
