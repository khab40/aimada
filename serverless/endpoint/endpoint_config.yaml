name: market-abuse-arena-ai-endpoint
container_port: 9000
public: true
auth: token
platform: cpu-d3
preset: 4vcpu-16gb
disk_size: 100Gi

image:
  repository: ghcr.io/your-org/ai-market-abuse-detection-arena-endpoint
  tag: latest

env:
  NEBIUS_ENDPOINT_MODE: mock
  NEBIUS_BASE_URL: https://api.tokenfactory.nebius.com/v1/
  NEBIUS_MODEL: meta-llama/Meta-Llama-3.1-8B-Instruct
  NEBIUS_TEMPERATURE: "0.2"
  NEBIUS_MAX_TOKENS: "800"
  NEBIUS_REQUEST_TIMEOUT_SECONDS: "12"

routes:
  detector_endpoint:
    path: /orderbook-alert
    input: recent L2 order book window
    output: suspicion score and detected synthetic pattern
  investigation_report_endpoint:
    path: /investigation-report
    input: scenario trace, alerts, metrics
    output: human-readable synthetic market abuse case report
  investigation_team_endpoint:
    path: /investigation-team
    input: incident, detector outputs, order-book context, trades, market metrics
    output: five-agent synthetic investigation verdict and evidence timeline
  compatibility:
    - /health
    - /explain-event
    - /generate-scenario
    - /generate-smart-scenario
    - /investigation-team
