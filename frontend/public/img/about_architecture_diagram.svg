  <rect x="70" y="612" width="1460" height="48" rx="14" fill="#0f172a" stroke="#1b344d" stroke-width="2"/>
  <text x="98" y="642" fill="#d8edf7" font-family="Inter, Arial, sans-serif" font-size="18">Pipeline: Scenario Generator -> FastAPI -> Agent Runners Workspace -> Smart Detection -> evidence -> AI Investigator / Nebius AI -> Managed Experiment reports.</text>
